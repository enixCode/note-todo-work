worker_processes 1;
error_log /dev/stderr info;

events {
    worker_connections 128;
}

env API_KEY;

http {
    lua_package_path "/app/lua/?.lua;;";
    access_log /dev/stdout;

    types {
        text/html html;
        text/css css;
        application/javascript js;
        application/json json;
        image/svg+xml svg;
        application/manifest+json json;
    }

    server {
        listen 8080;
        server_name _;

        # PWA static files - no cache
        location / {
            root /app/static;
            index index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
            try_files $uri $uri/ /index.html;
        }

        # GET /notes/review/pending - must be before /notes/:id
        location = /notes/review/pending {
            access_by_lua_block {
                require("auth").check()
            }
            content_by_lua_block {
                local notes = require("notes")
                notes.pending()
            }
        }

        # POST /notes - create
        location = /notes {
            access_by_lua_block {
                require("auth").check()
            }
            content_by_lua_block {
                local notes = require("notes")
                local method = ngx.req.get_method()

                if method == "GET" then
                    notes.list()
                elseif method == "POST" then
                    notes.create()
                else
                    ngx.status = 405
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"error":"method not allowed"}')
                end
            }
        }

        # PATCH /notes/:id/review
        location ~ ^/notes/([^/]+)/review$ {
            access_by_lua_block {
                require("auth").check()
            }
            content_by_lua_block {
                local notes = require("notes")
                local method = ngx.req.get_method()
                local id = ngx.var[1]

                if method == "PATCH" then
                    notes.review(id)
                else
                    ngx.status = 405
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"error":"method not allowed"}')
                end
            }
        }

        # GET/PUT/DELETE /notes/:id
        location ~ ^/notes/([^/]+)$ {
            access_by_lua_block {
                require("auth").check()
            }
            content_by_lua_block {
                local notes = require("notes")
                local method = ngx.req.get_method()
                local id = ngx.var[1]

                if method == "GET" then
                    notes.get(id)
                elseif method == "PUT" then
                    notes.update(id)
                elseif method == "DELETE" then
                    notes.delete(id)
                else
                    ngx.status = 405
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"error":"method not allowed"}')
                end
            }
        }
    }
}
